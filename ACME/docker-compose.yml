version: '3'

services:
    # Frontend
    nginx:
        image: nginx:latest
        restart: ${RESTART_POLICY}
        tty: true
        ports:
            - '${HTTP_PORT}:80'
            - '${HTTPS_PORT}:443'
        volumes:
            - ./nginx/config:/etc/nginx
            - ./certs:/certs
            - /var/log/nginx:/var/log/nginx
            
        networks:
            blammonet:

# Custom network so all services can communicate using a FQDN
networks:
    blammonet:
